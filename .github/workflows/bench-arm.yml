name: ARM Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench-arm64:
    name: Benchmark (ARM64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=3 -benchtime=2s -timeout=20m \
            -run='^$' \
            ./internal/graph/ \
            ./internal/search/ \
            ./internal/parser/languages/ \
            ./internal/resolver/ \
            ./internal/query/ \
            ./internal/indexer/ \
            ./internal/analysis/ \
            | tee bench-arm64.txt

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: bench-arm64-${{ github.sha }}
          path: bench-arm64.txt
          retention-days: 90

      - name: Compare with main (PR only)
        if: github.event_name == 'pull_request'
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          # Download baseline from main branch artifact if available
          echo "Benchmark results uploaded. Compare manually with benchstat."

  bench-amd64:
    name: Benchmark (AMD64 baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=3 -benchtime=2s -timeout=20m \
            -run='^$' \
            ./internal/graph/ \
            ./internal/search/ \
            ./internal/parser/languages/ \
            ./internal/resolver/ \
            ./internal/query/ \
            ./internal/indexer/ \
            ./internal/analysis/ \
            | tee bench-amd64.txt

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: bench-amd64-${{ github.sha }}
          path: bench-amd64.txt
          retention-days: 90
